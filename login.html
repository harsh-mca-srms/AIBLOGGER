<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Blogger · Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      font-family: "Sora", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ink: #0b1224;
      --teal: #0ea5e9;
      --blue: #2563eb;
      --card: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 90% at 18% 18%, rgba(14,165,233,0.22), transparent 46%),
        radial-gradient(90% 80% at 78% 8%, rgba(37,99,235,0.16), transparent 40%),
        linear-gradient(165deg, #ecf4ff 0%, #f7fbff 45%, #eef2ff 100%);
      position: relative;
      overflow: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 540px;
      height: 540px;
      filter: blur(90px);
      opacity: 0.28;
      animation: drift 22s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background: radial-gradient(circle, rgba(14,165,233,0.45) 0%, transparent 60%);
      top: -140px;
      left: -110px;
      animation-delay: -8s;
    }
    body::after {
      background: radial-gradient(circle, rgba(124,58,237,0.42) 0%, transparent 60%);
      bottom: -180px;
      right: -120px;
      animation-delay: -14s;
    }
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      50%  { transform: translate3d(40px,-40px,0) scale(1.05); }
      100% { transform: translate3d(-40px,60px,0) scale(1); }
    }
    .brand {
      position: fixed;
      top: 22px;
      left: 24px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(37,99,235,0.14);
      border-radius: 14px;
      padding: 8px 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      font-weight: 800;
      color: #0f172a;
      text-decoration: none;
    }
    .brand span {
      background: linear-gradient(120deg, var(--teal), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      width: min(440px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      padding: 30px 32px 32px;
      border: 1px solid rgba(37,99,235,0.08);
      position: relative;
      z-index: 2;
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    p.sub {
      margin: 6px 0 0;
      color: #475569;
      font-size: 14px;
    }
    label {
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
    }
    input {
      font: inherit;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid #d9e2ec;
      background: #f9fbff;
      color: var(--ink);
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
      outline: none;
    }
    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(14,165,233,0.16);
      background: #ffffff;
    }
    .row { display: grid; gap: 8px; }
    .actions { display: grid; gap: 10px; }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(120deg, var(--teal), var(--blue));
      color: #f8fafc;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.26);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 46px rgba(14, 165, 233, 0.35);
    }
    .muted {
      color: #64748b;
      font-size: 13px;
      text-align: center;
    }
    .muted a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <a class="brand" href="/"><span>AI</span> Blogger</a>
  <div class="card">
    <div>
      <h1>Welcome</h1>
      <p class="sub">Sign up or continue to start generating blogs.</p>
    </div>
    <div class="row">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="row">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="actions">
      <button id="login">Sign up / Continue</button>
      <div id="status" class="muted"></div>
    </div>
    <div class="muted">Already have access? Just continue.</div>
  </div>

  <script>
    const btn = document.getElementById('login');
    const statusEl = document.getElementById('status');
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        statusEl.textContent = 'Please enter email and password.';
        return;
      }
      statusEl.textContent = 'Saving...';
      fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(async (res) => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        statusEl.textContent = 'Saved. Redirecting...';
        setTimeout(() => window.location.href = '/', 400);
      })
      .catch((err) => {
        statusEl.textContent = 'Error: ' + err.message;
      });
    });
  </script>
</body>
</html>
