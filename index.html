<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Blogger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      --amber: #f59e0b;
      --teal: #0ea5e9;
      --violet: #7c3aed;
      --card: #0f172a;
      --surface: #0b1224;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(120% 120% at 15% 20%, rgba(14,165,233,0.15), transparent 45%),
                  radial-gradient(90% 90% at 80% 0%, rgba(245,158,11,0.18), transparent 42%),
                  linear-gradient(145deg, #050914 0%, #0b1224 100%);
    }
    .card {
      width: min(960px, 94vw);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      padding: 28px 32px 34px;
      display: grid;
      gap: 18px;
      backdrop-filter: blur(6px);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }
    p.lead {
      margin: 6px 0 0;
      color: #cbd5e1;
    }
    label {
      font-weight: 700;
      font-size: 14px;
      color: #e2e8f0;
      letter-spacing: 0.01em;
    }
    input, textarea, button {
      font: inherit;
    }
    .row {
      display: grid;
      gap: 8px;
    }
    input[type="text"] {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(226,232,240,0.18);
      outline: none;
      background: rgba(255,255,255,0.04);
      color: #f8fafc;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }
    input[type="text"]::placeholder {
      color: #94a3b8;
    }
    input[type="text"]:focus {
      border-color: rgba(14,165,233,0.6);
      box-shadow: 0 0 0 4px rgba(14,165,233,0.22);
      background: rgba(255,255,255,0.08);
    }
    button {
      justify-self: start;
      padding: 12px 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(120deg, var(--teal), var(--violet));
      color: #f8fafc;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
      box-shadow: 0 16px 40px rgba(124,58,237,0.35);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }
    button:not(:disabled):hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 20px 48px rgba(14,165,233,0.45);
    }
    #status {
      font-size: 14px;
      color: #cbd5e1;
      min-height: 20px;
    }
    #output {
      padding: 18px;
      border: 1px solid rgba(226,232,240,0.16);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      min-height: 140px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <h1>Generate a Blog</h1>
      <p style="margin:6px 0 0; color:#475569;">Enter a topic and we’ll draft a 1000-word SEO-ready post.</p>
    </div>
    <div class="row">
      <label for="topic">Topic</label>
      <input id="topic" type="text" placeholder="e.g., Benefits of Yoga">
    </div>
    <div class="row">
      <button id="generate">Generate</button>
      <div id="status"></div>
    </div>
    <div class="row">
      <label>Blog Draft</label>
      <div id="output">Nothing yet.</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('generate');
    const topicInput = document.getElementById('topic');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    async function generate() {
      const topic = topicInput.value.trim();
      if (!topic) {
        statusEl.textContent = 'Please enter a topic.';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Generating...';
      outputEl.textContent = '';

      try {
        const res = await fetch('/api/generate-blog', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Request failed');
        }

        outputEl.textContent = data.blog || 'No content returned.';
        statusEl.textContent = 'Done';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        outputEl.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', generate);
    topicInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        generate();
      }
    });
  </script>
</body>
</html>
