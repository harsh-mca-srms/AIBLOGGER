<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Blogger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      font-family: "Sora", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0b1224;
      --ink: #0b1224;
      --sand: #f2f5f8;
      --teal: #0ea5e9;
      --blue: #2563eb;
      --amber: #f59e0b;
      --card: #ffffff;
    }
    .photo-layer {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(120deg, rgba(5, 9, 20, 0.55), rgba(5, 9, 20, 0.25)),
        url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=2000&q=80"),
        url("https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=2000&q=80");
      background-size: cover, cover, cover;
      background-position: center, 20% 40%, 80% 50%;
      background-repeat: no-repeat;
      opacity: 0.28;
      filter: blur(1.5px);
      z-index: 1;
      pointer-events: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 90% at 20% 15%, rgba(14,165,233,0.18), transparent 45%),
        radial-gradient(100% 80% at 85% 0%, rgba(245,158,11,0.16), transparent 40%),
        linear-gradient(160deg, #ecf4ff 0%, #f7fbff 40%, #eef2ff 100%);
      position: relative;
      overflow: hidden;
    }
    /* Soft, imaginative moving blobs */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      filter: blur(90px);
      opacity: 0.35;
      animation: drift 22s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      background: radial-gradient(circle, rgba(14,165,233,0.38) 0%, transparent 55%);
      top: -140px;
      left: -120px;
      animation-delay: -6s;
    }
    body::after {
      background: radial-gradient(circle, rgba(124,58,237,0.38) 0%, transparent 55%);
      bottom: -180px;
      right: -100px;
      animation-delay: -12s;
    }
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      50%  { transform: translate3d(60px,-30px,0) scale(1.05); }
      100% { transform: translate3d(-60px,40px,0) scale(1); }
    }
    /* Subtle moving text ribbon */
    .floating-text {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
      mix-blend-mode: multiply;
      opacity: 0.08;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #0f172a;
    }
    .floating-text span {
      position: absolute;
      white-space: nowrap;
      animation: marquee 28s linear infinite;
      font-size: clamp(42px, 5vw, 64px);
    }
    .floating-text span:nth-child(1) { top: 18%; left: -40%; }
    .floating-text span:nth-child(2) { top: 58%; left: -30%; animation-duration: 32s; }
    .floating-text span:nth-child(3) { top: 78%; left: -50%; animation-duration: 36s; }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(120%); }
    }
    .card {
      width: min(980px, 94vw);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      padding: 30px 34px 36px;
      display: grid;
      gap: 20px;
      border: 1px solid rgba(37,99,235,0.08);
      position: relative;
      z-index: 3;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    p.lead {
      margin: 8px 0 0;
      color: #475569;
      font-size: 15px;
    }
    label {
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
      letter-spacing: 0.01em;
    }
    input, textarea, button {
      font: inherit;
    }
    .row {
      display: grid;
      gap: 10px;
    }
    input[type="text"] {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #d9e2ec;
      outline: none;
      background: #f9fbff;
      color: var(--ink);
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }
    input[type="text"]::placeholder {
      color: #94a3b8;
    }
    input[type="text"]:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(14,165,233,0.16);
      background: #ffffff;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(120deg, var(--teal), var(--blue));
      color: #f8fafc;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.26);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    button:not(:disabled):hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 18px 46px rgba(14, 165, 233, 0.35);
    }
    #status {
      font-size: 14px;
      color: #475569;
      min-height: 20px;
    }
    #output {
      padding: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: #f8fafc;
      min-height: 160px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #0f172a;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(14,165,233,0.12);
      color: #0c4a6e;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
  <body>
  <div class="photo-layer"></div>
  <div class="floating-text">
    <span>IMAGINATION · STORY · IDEAS · CREATIVITY ·</span>
    <span>INSPIRE · CREATE · SHARE · GROW ·</span>
    <span>WORDS · VISIONS · FUTURES ·</span>
  </div>
  <div class="card">
    <div>
      <div class="badge">AI Blogger · Gemini + Redis</div>
      <h1>Generate a Blog</h1>
      <p class="lead">Enter a topic and we’ll draft a 1000-word, SEO-ready post in seconds.</p>
    </div>
    <div class="row">
      <label for="topic">Topic</label>
      <input id="topic" type="text" placeholder="e.g., Benefits of Yoga">
    </div>
    <div class="actions">
      <button id="generate">Generate</button>
      <div id="status"></div>
    </div>
    <div class="row">
      <label>Blog Draft</label>
      <div id="output">Nothing yet.</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('generate');
    const topicInput = document.getElementById('topic');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    async function generate() {
      const topic = topicInput.value.trim();
      if (!topic) {
        statusEl.textContent = 'Please enter a topic.';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Generating...';
      outputEl.textContent = '';

      try {
        const res = await fetch('/api/generate-blog', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Request failed');
        }

        outputEl.textContent = data.blog || 'No content returned.';
        statusEl.textContent = 'Done';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        outputEl.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', generate);
    topicInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        generate();
      }
    });
  </script>
</body>
</html>
